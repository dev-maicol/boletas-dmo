name: Keep Supabase Alive

# Mantiene activa la base de datos de Supabase (plan gratuito se pausa tras
# 7 dias de inactividad). Hace un ping diario a la API REST: cualquier
# consulta cuenta como actividad y reinicia ese contador de 7 dias.

on:
  schedule:
    # Cada dia a las 06:00 UTC. GitHub puede retrasar/saltar ejecuciones bajo
    # carga, por eso es diario y no cada 5-6 dias: da margen sobrado.
    - cron: "0 6 * * *"
  # Permite lanzarlo a mano desde la pestana Actions para probarlo.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consulta ligera a Supabase REST
        env:
          # Acepta el valor tanto si se guardo como Secret como si se guardo
          # como Variable en Settings -> Secrets and variables -> Actions.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        run: |
          curl --fail --silent --show-error \
            "${SUPABASE_URL}/rest/v1/trabajadores?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          echo ""
          echo "Ping a Supabase completado correctamente."
